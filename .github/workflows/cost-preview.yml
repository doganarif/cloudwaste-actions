name: CloudWaste Cost Preview

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/docker-compose*.yml'
      - '.github/workflows/cost-preview.yml'

permissions:
  pull-requests: write

jobs:
  cost-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract resources from Terraform
        id: extract
        run: |
          # Example: parse instance types from .tf files
          # Customize this for your IaC setup
          RESOURCES='[]'

          # Scan for aws_instance resources
          for f in $(find . -name '*.tf' -type f); do
            while IFS= read -r line; do
              instance_type=$(echo "$line" | grep -oP 'instance_type\s*=\s*"\K[^"]+')
              if [ -n "$instance_type" ]; then
                RESOURCES=$(echo "$RESOURCES" | jq --arg t "$instance_type" '. + [{"type":"ec2","instance_type":$t,"count":1,"region":"us-east-1"}]')
              fi
            done < "$f"
          done

          # Scan for aws_db_instance resources
          for f in $(find . -name '*.tf' -type f); do
            while IFS= read -r line; do
              instance_class=$(echo "$line" | grep -oP 'instance_class\s*=\s*"\K[^"]+')
              if [ -n "$instance_class" ]; then
                RESOURCES=$(echo "$RESOURCES" | jq --arg t "$instance_class" '. + [{"type":"rds","instance_type":$t,"count":1,"region":"us-east-1"}]')
              fi
            done < "$f"
          done

          echo "resources=$RESOURCES" >> "$GITHUB_OUTPUT"

      - name: Get cost estimate
        if: steps.extract.outputs.resources != '[]'
        id: estimate
        env:
          CLOUDWASTE_TOKEN: ${{ secrets.CLOUDWASTE_API_TOKEN }}
          CLOUDWASTE_URL: ${{ vars.CLOUDWASTE_URL || 'https://cloudwaste.io' }}
        run: |
          RESPONSE=$(curl -sS --max-time 30 \
            -X POST "$CLOUDWASTE_URL/api/cost-preview" \
            -H "Authorization: Bearer $CLOUDWASTE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"resources\": ${{ steps.extract.outputs.resources }}}")

          TOTAL=$(echo "$RESPONSE" | jq -r '.total_monthly_cost_usd // "unknown"')
          BREAKDOWN=$(echo "$RESPONSE" | jq -r '.breakdown[] | "| \(.instance_type) | \(.count) | $\(.monthly_cost_usd // "?") |"')

          {
            echo "## CloudWaste Cost Preview"
            echo ""
            echo "**Estimated monthly cost:** \$${TOTAL}"
            echo ""
            echo "| Instance Type | Count | Monthly Cost |"
            echo "|:-------------|------:|-------------:|"
            echo "$BREAKDOWN"
            echo ""
            echo "*Generated by [CloudWaste](https://cloudwaste.io)*"
          } > cost-comment.md

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.estimate.outputs.total != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('cost-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('CloudWaste Cost Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
